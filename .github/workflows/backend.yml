name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "Files not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          # golangci-lint v2 (needed for go1.25 support) requires
          # golangci-lint-action v7 — v6 hard-rejects any v2.x version string.
          version: v2.5.0

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: opencharge
          POSTGRES_PASSWORD: opencharge
          POSTGRES_DB: opencharge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opencharge -d opencharge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://opencharge:opencharge@localhost:5432/opencharge?sslmode=disable
      TEST_DATABASE_URL: postgres://opencharge:opencharge@localhost:5432/opencharge?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - name: Run migrations
        run: migrate -path db/migrations -database "$DATABASE_URL" up
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (unit + integration against Postgres/PostGIS)
        # -p 1: internal/api and internal/repository integration tests share
        # the same database and truncate tables on setup, so packages must
        # run sequentially, not in parallel.
        run: go test ./internal/... -p 1 -race -cover

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: api
          push: false
          tags: opencharge-api:ci
      - name: Build ingest image
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: ingest
          push: false
          tags: opencharge-ingest:ci
