name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/web/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: frontend/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
