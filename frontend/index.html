<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Charge Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-kicker">Charge Map</div>
          <h1>Carte de test backend</h1>
          <p>Stations, opérateurs et meilleur tarif par borne.</p>
        </div>

        <div class="panel">
          <label for="apiBase">API</label>
          <input id="apiBase" type="text" value="http://localhost:8080" spellcheck="false" />

          <label for="operatorFilter">Opérateur</label>
          <select id="operatorFilter">
            <option value="">Tous les opérateurs</option>
          </select>

          <label for="cityFilter">Ville</label>
          <input id="cityFilter" type="text" placeholder="Ex: Lyon" spellcheck="false" />

          <div class="actions">
            <button id="refreshBtn">Rafraîchir</button>
            <button id="resetBtn" class="secondary">Réinitialiser</button>
          </div>

          <div class="stats" id="stats"></div>
          <div class="status" id="status">Prêt.</div>
        </div>

        <div class="list-panel">
          <div class="list-header">
            <h2>Stations</h2>
            <span id="visibleCount">0</span>
          </div>
          <div id="stationList" class="station-list"></div>
        </div>
      </aside>

      <main class="map-panel">
        <div id="map"></div>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
