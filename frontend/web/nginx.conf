server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HashRouter keeps all routes under "/", but this fallback also covers
    # a future switch to path-based routing without extra config changes.
    location / {
        try_files $uri /index.html;
    }
}
