server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Single-port setup: the api container is never published on the host,
    # only reachable through this reverse proxy. The trailing slash on
    # proxy_pass strips the /api/ prefix before forwarding.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HashRouter keeps all routes under "/", but this fallback also covers
    # a future switch to path-based routing without extra config changes.
    location / {
        try_files $uri /index.html;
    }
}
