version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: opencharge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opencharge
      POSTGRES_PASSWORD: opencharge
      POSTGRES_DB: opencharge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencharge"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opencharge-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgres://opencharge:opencharge@postgres:5432/opencharge?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: opencharge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"

volumes:
  pgdata:
